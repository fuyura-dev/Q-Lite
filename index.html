<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q-Lite</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <div class="panel__header">
          <div>
            <p class="eyebrow">7x7 Quoridor</p>
            <h1>Q-Lite</h1>
          </div>
          <div class="controls">
            <label class="field">
              <span>Mode</span>
              <select id="mode-select">
                <option value="human-vs-human">Human vs Human</option>
                <option value="human-vs-ai">Human vs AI</option>
              </select>
            </label>
            <button id="restart-button" type="button">Restart</button>
          </div>
        </div>

        <div class="status-bar">
          <p id="status-text">Loading...</p>
        </div>

        <div class="board-frame">
          <canvas
            id="game-canvas"
            width="720"
            height="720"
            aria-label="Quoridor game board"
          ></canvas>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
