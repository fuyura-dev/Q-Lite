<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Naku</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-stage">
      <div id="board-viewport" class="board-viewport"></div>
      <div id="main-menu" class="main-menu">
        <div class="main-menu__content">
          <h1 id="main-menu-title" class="main-menu__title">AI Naku</h1>
          <p class="main-menu__summary">
            Race to the far side, cut routes with limited waqlls, and outthink
            the board before it closes around you.
          </p>
          <div class="main-menu__modes">
            <button
              class="mode-card is-selected"
              type="button"
              data-menu-mode="human-vs-human"
            >
              <span class="mode-card__title">Human vs Human</span>
              <span class="mode-card__text"
                >Two local players, same board.</span
              >
            </button>
            <button
              class="mode-card"
              type="button"
              data-menu-mode="human-vs-ai"
            >
              <span class="mode-card__title">Human vs AI</span>
              <span class="mode-card__text">Player 1 faces the computer.</span>
            </button>
            <button class="mode-card" type="button" data-menu-mode="ai-vs-ai">
              <span class="mode-card__title">AI vs AI</span>
              <span class="mode-card__text">Watch both sides calculate.</span>
            </button>
          </div>

          <div class="main-menu__actions">
            <button id="start-game-button" class="start-button">
              Start Game
            </button>
          </div>
        </div>
      </div>
      <div class="game-ui">
        <header class="game-hud">
          <div class="game-hud__brand">
            <h1>AI Naku</h1>
          </div>

          <div class="game-hud__controls">
            <label for="" class="field">
              <span>Mode</span>
              <select name="" id="mode-select">
                <option value="human-vs-human">Human vs Human</option>
                <option value="human-vs-ai">Human vs AI</option>
                <option value="ai-vs-ai">AI vs AI</option>
              </select>
            </label>
            <button id="ai-toggle-button" type="button">Start AI</button>
            <button id="ai-step-button" type="button">Next Move</button>
            <button id="restart-button" type="button">Restart</button>
            <button id="main-menu-button" type="button">Main Menu</button>
          </div>
        </header>

        <div class="status-bar">
          <p id="status-text">Loading...</p>
        </div>

        <aside class="game-sidebar">
          <div class="game-info">
            <h2 class="game-info__title">Game Info</h2>
            <div class="info-card">
              <p class="info-card__label">Current Turn</p>
              <p class="info-card__value" id="info-current-turn">Player 1</p>
            </div>
            <div class="info-card">
              <p class="info-card__label">Player 1 Walls</p>
              <p class="info-card__value" id="info-player-one-walls">8</p>
            </div>
            <div class="info-card">
              <p class="info-card__label">Player 2 Walls</p>
              <p class="info-card__value" id="info-player-two-walls">8</p>
            </div>
          </div>

          <!-- Temporary development info area. Not part of the final UI -->
          <div class="dev-info">
            <p id="dev-info-text">blank</p>
          </div>
        </aside>
      </div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
