name: Vercel Production Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main
jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Fetch emsdk
        run: git clone https://github.com/emscripten-core/emsdk.git ai/emsdk
      - name: Setup Node
        uses: actions/setup-node@v2
        with:
          node-version: 22
      - name: Install frontend dependencies
        run: npm ci
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build python3 && pip install cmake
      - name: Install and activate emsdk
        shell: bash
        run: cd ai/emsdk && ./emsdk install latest && ./emsdk activate latest
      - name: Build wasm engine
        shell: bash
        run: cd ai && source emsdk/emsdk_env.sh && cmake --preset wasm && cmake --build --preset wasm
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
